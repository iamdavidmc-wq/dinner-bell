name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Optional: Lets you manually trigger from the Actions tab (great for testing)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5   # Updated to latest stable (v5)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4   # Updated to v4 (latest as of 2025+)
        with:
          path: '.'   # Your files are at root → this is correct

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4   # Updated to v4 (fixes many 404 issues)
