<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dinner Bell 🍽️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Dinner Bell">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Patrick Hand', cursive;
            background: linear-gradient(135deg, #e67e22 0%, #f5deb3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #3d2b1f;
            padding: 20px;
            touch-action: manipulation;
            position: relative;
        }
        
        /* Subtle paper texture overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-family: 'Patrick Hand', cursive;
            color: #5d4037;
        }
        
        .room-info {
            background: #fff8dc;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d4c4a8;
        }
        
        .room-label {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 5px;
            font-family: 'Patrick Hand', cursive;
        }
        
        .room-code {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            font-family: monospace;
            color: #3d2b1f;
        }
        
        .bell-button {
            font-size: 14rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            margin: 10px 0;
            line-height: 1;
        }
        
        .bell-button:active {
            transform: scale(0.9);
        }
        
        .bell-label {
            font-size: 1.8rem;
            margin-top: 5px;
            opacity: 0.9;
            font-family: 'Patrick Hand', cursive;
            color: #5d4037;
        }
        
        .message {
            background: #fff8dc;
            padding: 25px 30px;
            border-radius: 12px;
            margin-top: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d4c4a8;
            position: relative;
            /* Recipe card ruled lines */
            background-image: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 1.8rem,
                #d4c4a8 1.8rem,
                #d4c4a8 1.9rem
            );
            background-size: 100% 3.8rem;
        }
        
        .message-content {
            background: rgba(255, 248, 220, 0.95);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .setup-option {
            background: #fff8dc;
            padding: 30px;
            border-radius: 15px;
            margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d4c4a8;
        }
        
        .big-button {
            background: linear-gradient(to bottom, #8b4513, #654321);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
            min-width: 200px;
            font-family: 'Patrick Hand', cursive;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid #a0522d;
        }
        
        .big-button:hover {
            background: linear-gradient(to bottom, #9e5a2a, #755624);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }
        
        .pairing-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid #d4c4a8;
            border-radius: 12px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 5px;
            max-width: 250px;
            background: #fffef5;
            font-family: monospace;
            color: #3d2b1f;
        }
        
        .pairing-input:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.2);
        }
        
        .pairing-button {
            background: linear-gradient(to bottom, #228b22, #1a6b1a);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Patrick Hand', cursive;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid #2e8b2e;
        }
        
        .pairing-button:hover {
            background: linear-gradient(to bottom, #269926, #1e7b1e);
            transform: translateY(-2px);
        }
        
        .hidden {
            display: none !important;
        }
        
        .ring-time {
            font-size: 0.9rem;
            margin-top: 8px;
            opacity: 0.7;
            font-family: 'Patrick Hand', cursive;
            color: #5d4037;
        }
        
        .reset-link {
            background:none;
            border:none;
            color: #8b4513;
            font-size:1rem;
            text-decoration:underline;
            cursor:pointer;
            margin-top:20px;
            font-family: 'Patrick Hand', cursive;
        }
        
        .reset-link:hover {
            color: #654321;
        }
        
        #wakeLockBtn {
            background: rgba(139, 69, 19, 0.15);
            border: 2px solid #d4c4a8;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1rem;
        }
        
        #wakeLockBtn:hover {
            background: rgba(139, 69, 19, 0.25);
        }
        
        #pairingStatus {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.1rem;
        }
        
        /* Timer Section Styles */
        .timer-card {
            background: linear-gradient(145deg, #fffef8 0%, #fff8dc 100%);
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 8px 32px rgba(139, 69, 19, 0.15), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            border: 2px solid #d4c4a8;
            margin-bottom: 20px;
        }
        
        .timer-section-title {
            font-size: 1.3rem;
            color: #8b4513;
            margin-bottom: 8px;
            font-family: 'Patrick Hand', cursive;
        }
        
        .timer-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .timer-picker-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .timer-picker-label {
            font-size: 0.85rem;
            color: #8b4513;
            font-weight: bold;
            font-family: 'Patrick Hand', cursive;
        }
        
        .timer-picker-controls {
            display: flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(145deg, #fffef8, #fff8dc);
            border: 3px solid #d4c4a8;
            border-radius: 15px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .timer-picker-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #f5deb3, #e6d2a0);
            color: #8b4513;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            transition: all 0.2s;
        }
        
        .timer-picker-btn:hover {
            background: linear-gradient(145deg, #ffe4b5, #f0d9a8);
            transform: scale(1.05);
        }
        
        .timer-picker-btn:active {
            transform: scale(0.95);
        }
        
        .timer-picker-value {
            min-width: 50px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #8b4513;
            font-family: 'Courier New', monospace;
        }
        
        .timer-picker-unit {
            font-size: 0.8rem;
            color: #8b4513;
            opacity: 0.7;
            font-family: 'Patrick Hand', cursive;
        }
        
        .preset-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .preset-btn {
            background: linear-gradient(145deg, #f5deb3, #e6d2a0);
            color: #8b4513;
            border: 2px solid #d4c4a8;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Patrick Hand', cursive;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        
        .preset-btn:hover {
            background: linear-gradient(145deg, #ffe4b5, #f0d9a8);
            border-color: #8b4513;
            transform: translateY(-1px);
        }
        
        .control-buttons-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .timer-control-btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            font-size: 1.1rem;
            font-family: 'Patrick Hand', cursive;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .start-btn {
            background: linear-gradient(145deg, #e67e22, #d35400) !important;
            color: white;
            border: 2px solid #bf6a2e;
        }
        
        .start-btn:hover {
            background: linear-gradient(145deg, #f39c12, #e67e22) !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.5);
        }
        
        .stop-btn {
            background: linear-gradient(145deg, #d4a574, #b8860b);
            color: white;
            border: 2px solid #8b4513;
        }
        
        .stop-btn:hover {
            background: linear-gradient(145deg, #e6b87d, #d4a574);
            transform: translateY(-2px);
        }
        
        .timer-display-container {
            background: linear-gradient(145deg, #3d2b1f, #2a1f15);
            border-radius: 50%;
            width: 140px;
            height: 140px;
            display: none;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1);
            border: 4px solid #d4c4a8;
            position: relative;
        }
        
        .timer-display-container.show {
            display: flex;
        }
        
        .timer-display-container.running {
            box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1), 0 0 40px rgba(230, 126, 34, 0.6);
            border-color: #e67e22;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1), 0 0 30px rgba(230, 126, 34, 0.4); }
            50% { box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1), 0 0 50px rgba(230, 126, 34, 0.7); }
        }
        
        .timer-display {
            font-size: 2.2rem;
            font-weight: bold;
            color: #f5deb3;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(245, 222, 179, 0.5);
        }
        
        .timer-done .timer-display-container {
            animation: bellShake 0.5s ease-in-out;
            border-color: #ffd700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.8);
        }
        
        @keyframes bellShake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-10deg); }
            40% { transform: rotate(10deg); }
            60% { transform: rotate(-10deg); }
            80% { transform: rotate(10deg); }
        }
        
        .timer-done .timer-display {
            color: #ffd700;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            animation: pulse 0.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .timer-note {
            font-size: 0.8rem;
            color: #8b4513;
            opacity: 0.7;
            margin-bottom: 12px;
            font-style: italic;
        }
        
        @media (min-width: 500px) {
            .timer-card {
                padding: 30px 25px;
            }
            .timer-section-title {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }
            .timer-picker {
                gap: 30px;
                margin-bottom: 25px;
            }
            .timer-picker-label {
                font-size: 1rem;
            }
            .timer-picker-btn {
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
            }
            .timer-picker-value {
                min-width: 70px;
                font-size: 2.5rem;
            }
            .preset-row {
                gap: 10px;
                margin-bottom: 20px;
            }
            .preset-btn {
                padding: 10px 16px;
                font-size: 1rem;
            }
            .control-buttons-row {
                gap: 20px;
                margin-bottom: 25px;
            }
            .timer-control-btn {
                padding: 15px 45px;
                font-size: 1.3rem;
                min-width: 120px;
            }
            .timer-display-container {
                width: 180px;
                height: 180px;
            }
            .timer-display {
                font-size: 3rem;
            }
        }
        
        /* Acknowledgment Popup */
        .ack-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .ack-overlay.show {
            display: flex;
        }
        
        .ack-popup {
            background: linear-gradient(145deg, #5d4037, #3d2b1f);
            border: 4px solid #d4a574;
            border-radius: 25px;
            padding: 40px 35px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: ackPopIn 0.4s ease-out;
        }
        
        @keyframes ackPopIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .ack-popup-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        
        .ack-popup-text {
            color: #f5deb3;
            font-size: 2rem;
            line-height: 1.4;
            margin-bottom: 25px;
            font-family: 'Patrick Hand', cursive;
        }
        
        .ack-close {
            background: #d4a574;
            border: none;
            color: #3d2b1f;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-family: 'Patrick Hand', cursive;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .ack-close:hover {
            background: #e6b87d;
            transform: translateY(-2px);
        }
        
        /* Receiver: Bell tap to acknowledge feedback */
        .bell-acked {
            animation: bellAck 0.3s ease-out;
        }
        
        @keyframes bellAck {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Show title only in pairing mode -->
        <h1 id="title" style="font-size: 2rem; margin-bottom: 15px;">🍴 Dinner Bell 🔔</h1>
        
        <div id="pairingSection">
            <div class="room-label">Your Room Code</div>
            <div id="myRoomCode" class="room-code">---</div>
            <p style="margin: 15px 0; opacity: 0.8;">Share this code</p>
            
            <div style="margin: 15px 0; opacity: 0.5;">— or —</div>
            
            <input type="text" id="pairingCode" class="pairing-input" placeholder="ENTER CODE" maxlength="6">
            <button onclick="pairWithRoom()" class="pairing-button">Connect</button>
            <p id="pairingStatus" style="margin-top: 15px; min-height: 20px;"></p>
        </div>
        
        <div id="mainApp" class="hidden">
            <!-- BELL SECTION - Top of page, higher position -->
            <div style="padding-bottom: 15px; border-bottom: 2px dashed #d4c4a8; margin-bottom: 25px;">
                <h2 style="font-size: 1.3rem; color: #8b4513; margin-bottom: 8px; font-family: 'Patrick Hand', cursive;">🔔 DINNER BELL</h2>
                
                <!-- Large centered bell -->
                <button id="bellBtn" class="bell-button">🔔</button>
                
                <!-- Status text below bell -->
                <div id="statusText" style="font-size: 1.2rem; color: #5d4037; margin-top: 5px;">Ready</div>
                
            </div>
            
            <!-- Acknowledgment popup (hidden by default) -->
            <div id="ackOverlay" class="ack-overlay">
                <div class="ack-popup">
                    <div class="ack-popup-icon">🏃‍♂️</div>
                    <div id="ackText" class="ack-popup-text"></div>
                    <button class="ack-close" onclick="dismissAck()">Got it!</button>
                </div>
            </div>
            
            <!-- TIMER SECTION - Enhanced stylish layout -->
            <div class="timer-card">
                <div class="timer-section-title">⏰ DINNER TIMER</div>
                
                <div class="timer-note">Tap + and - to set time</div>
                
                <!-- +/- Time picker -->
                <div class="timer-picker">
                    <div class="timer-picker-group">
                        <span class="timer-picker-label">Minutes</span>
                        <div class="timer-picker-controls">
                            <button class="timer-picker-btn" onclick="adjustMinutes(-1)">−</button>
                            <span class="timer-picker-value" id="minutesValue">0</span>
                            <button class="timer-picker-btn" onclick="adjustMinutes(1)">+</button>
                        </div>
                    </div>
                    <div class="timer-picker-group">
                        <span class="timer-picker-label">Seconds</span>
                        <div class="timer-picker-controls">
                            <button class="timer-picker-btn" onclick="adjustSeconds(-5)">−</button>
                            <span class="timer-picker-value" id="secondsValue">0</span>
                            <button class="timer-picker-btn" onclick="adjustSeconds(5)">+</button>
                        </div>
                    </div>
                </div>
                
                <!-- Preset buttons -->
                <div class="preset-row">
                    <button onclick="setPreset(1)" class="preset-btn">🥚 1m</button>
                    <button onclick="setPreset(3)" class="preset-btn">🥣 3m</button>
                    <button onclick="setPreset(5)" class="preset-btn">🍝 5m</button>
                    <button onclick="setPreset(10)" class="preset-btn">🍖 10m</button>
                </div>
                
                <!-- Start/Stop controls -->
                <div class="control-buttons-row">
                    <button onclick="startTimer()" class="timer-control-btn start-btn">Start</button>
                    <button onclick="stopTimer()" class="timer-control-btn stop-btn">Stop</button>
                </div>
                
                <!-- Circular timer display -->
                <div id="timerDisplayContainer" class="timer-display-container">
                    <div id="timerDisplay" class="timer-display"></div>
                </div>
            </div>
            
            <!-- Bottom row: Room code | Awake | Reset -->
            <div style="margin-top: 25px; display: flex; gap: 20px; justify-content: center; align-items: center; flex-wrap: wrap;">
                <span id="roomInfoSmall" style="font-size: 0.8rem; color: #8b4513; opacity: 0.5;">Room: <span id="currentRoomSmall">---</span></span>
                <button id="wakeLockBtn" onclick="toggleWakeLock()" style="background: rgba(139, 69, 19, 0.1); border: 1px solid #d4c4a8; padding: 8px 15px; border-radius: 20px; color: #8b4513; font-family: 'Patrick Hand', cursive; font-size: 0.85rem;">Awake</button>
                <button onclick="resetApp()" style="background: none; border: none; color: #8b4513; font-size: 0.85rem; text-decoration: underline; font-family: 'Patrick Hand', cursive;">Reset</button>
            </div>
        </div>
    </div>

    <audio id="bellAudio" preload="auto" style="display:none;">
        <source src="ding.mp3" type="audio/mpeg">
    </audio>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

            measurementId: "G-DQ7J8VEC5X"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio element for bell sound
        const bellAudio = document.getElementById('bellAudio');
        
        // Room management
        let currentRoom = localStorage.getItem('dinnerBellRoom');
        const pairingInput = document.getElementById('pairingCode');
        const pairingSection = document.getElementById('pairingSection');
        const mainApp = document.getElementById('mainApp');
        const bellBtn = document.getElementById('bellBtn');
        const message = document.getElementById('message');
        const messageContent = document.querySelector('.message-content');
        const myRoomCodeEl = document.getElementById('myRoomCode');
        const currentRoomEl = document.getElementById('currentRoom');
        const pairingStatus = document.getElementById('pairingStatus');
        const lastRingEl = document.getElementById('lastRing');
        
        // Generate 6-digit room code if none exists
        if (!currentRoom) {
            currentRoom = String(Math.floor(100000 + Math.random() * 900000));
            localStorage.setItem('dinnerBellRoom', currentRoom);
        }
        
        myRoomCodeEl.textContent = currentRoom;
        
        // ========== ACKNOWLEDGMENT FEATURE ==========
        const ackMessages = [
            "On my way! 🏃‍♂️",
            "Heard it! Coming! 🍽️",
            "My belly is rumbling... coming! 🤤",
            "Dinner time! Be right there! 🔥",
            "Got it! Heading to the table! 🍴",
            "OK! I'll be right there! 🎯",
            "Coming! Don't start without me! 🏃‍♀️"
        ];
        
        let lastRingTimestamp = 0;
        let lastAckTimestamp = 0;
        let hasReceivedRing = false;
        let ackListener = null;
        
        function dismissAck() {
            document.getElementById('ackOverlay').classList.remove('show');
        }
        
        function showAckMessage() {
            const ackText = document.getElementById('ackText');
            const ackOverlay = document.getElementById('ackOverlay');
            const randomMsg = ackMessages[Math.floor(Math.random() * ackMessages.length)];
            ackText.textContent = randomMsg;
            ackOverlay.classList.add('show');
            
            // Reset status text
            const statusText = document.getElementById('statusText');
            statusText.textContent = "Ringing...";
            statusText.style.color = "#8b4513";
        }
        
        function startAckListener() {
            if (ackListener) {
                db.ref('rooms/' + currentRoom + '/ack').off();
            }
            
            ackListener = db.ref('rooms/' + currentRoom + '/ack');
            ackListener.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.timestamp > lastRingTimestamp && data.timestamp > lastAckTimestamp) {
                    lastAckTimestamp = data.timestamp;
                    showAckMessage();
                }
            });
        }
        
        function clearAckBanner() {
            document.getElementById('ackOverlay').classList.remove('show');
        }
        
        // If already paired (has a different room in localStorage), join it directly
        const pairedRoom = localStorage.getItem('dinnerBellPairedRoom');
        if (pairedRoom) {
            enterRoom(pairedRoom);
        }
        
        // Pair with another room
        function pairWithRoom() {
            const code = pairingInput.value.trim().toUpperCase();
            if (code.length !== 6 || !/^\d+$/.test(code)) {
                pairingStatus.textContent = "Please enter a valid 6-digit code";
                pairingStatus.style.color = "#8b0000";
                return;
            }
            
            // Check if room exists by reading a test location
            const testRef = db.ref('rooms/' + code + '/exists');
            testRef.set(true);
            
            testRef.once('value').then(() => {
                // Room exists or was just created, join it
                localStorage.setItem('dinnerBellPairedRoom', code);
                enterRoom(code);
            }).catch(() => {
                pairingStatus.textContent = "Could not connect. Make sure the code is correct.";
                pairingStatus.style.color = "#8b0000";
            });
        }
        
        function enterRoom(roomCode) {
            currentRoom = roomCode;
            document.getElementById('currentRoomSmall').textContent = roomCode;
            document.getElementById('title').style.display = 'none';
            pairingSection.classList.add('hidden');
            mainApp.classList.remove('hidden');
            
            // Track when we joined to ignore old ring events
            const joinTime = Date.now();
            
            // Listen for ring events (receiver)
            const ringRef = db.ref('rooms/' + roomCode + '/ring');
            ringRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.active === true) {
                    // Only trigger if ring happened after we joined (within 1 second grace period)
                    const ringTime = data.timestamp;
                    if (ringTime >= joinTime - 1000) {
                        // Bell is ringing! This is the receiver
                        triggerBell(true);
                        
                        // Update last ring time
                        const time = new Date(ringTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        lastRingEl.textContent = `Last rung: ${time}`;
                    }
                }
            });
            
            // Mark as online
            db.ref('rooms/' + roomCode + '/users/' + getDeviceId()).set({
                online: true,
                lastSeen: Date.now()
            });
            
            // Start listening for acknowledgments (in case we ring later)
            startAckListener();
        }
        
        function getDeviceId() {
            let id = localStorage.getItem('dinnerBellDeviceId');
            if (!id) {
                id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('dinnerBellDeviceId', id);
            }
            return id;
        }
        
        function triggerBell(isReceiver) {
            // Mark that this device has received a ring (can now acknowledge)
            if (isReceiver) {
                hasReceivedRing = true;
            }
            
            // Play sound three times, waiting for each to finish
            let playCount = 0;
            const maxPlays = 3;
            
            function playNext() {
                if (playCount < maxPlays) {
                    bellAudio.currentTime = 0;
                    bellAudio.play().catch(e => console.log('Audio play failed:', e));
                    playCount++;
                }
            }
            
            // Listen for when audio ends, then play next ring
            bellAudio.onended = function() {
                if (playCount < maxPlays) {
                    // Wait a brief pause between rings
                    setTimeout(playNext, 0);
                }
            };
            
            // Start first ring
            playNext();
            
            // Use small status text instead of large message box
            const statusText = document.getElementById('statusText');
            
            if (isReceiver) {
                // Receiver sees the excited message
                statusText.innerHTML = "<strong>Dinner is ready!</strong> COME AND GET EAT! 🔥";
                statusText.style.color = "#e67e22";
                statusText.style.fontWeight = "bold";
                
                // Keep message for 8 seconds then back to ready
                setTimeout(() => {
                    statusText.textContent = "Ready";
                    statusText.style.color = "#5d4037";
                    statusText.style.fontWeight = "normal";
                }, 8000);
            } else {
                // Sender sees brief confirmation
                statusText.textContent = "Ringing...";
                statusText.style.color = "#8b4513";
                
                // Back to ready after 2 seconds
                setTimeout(() => {
                    statusText.textContent = "Ready";
                    statusText.style.color = "#5d4037";
                }, 2000);
                setTimeout(() => {
                    messageContent.innerHTML = "Connected & ready";
                    message.style.background = "rgba(255, 248, 220, 0.7)";
                }, 2000);
            }
        }
        
        // Bell button press (sender)
        bellBtn.addEventListener('click', () => {
            if (!currentRoom) return;
            
            // Check if this is a receiver who received a ring and is acknowledging
            if (hasReceivedRing) {
                // Send acknowledgment
                db.ref('rooms/' + currentRoom + '/ack').set({
                    timestamp: Date.now()
                });
                
                // Clear the ring on Firebase so we don't re-receive it
                db.ref('rooms/' + currentRoom + '/ring').set(null);
                
                // Visual feedback for ack sent
                bellBtn.classList.add('bell-acked');
                setTimeout(() => {
                    bellBtn.classList.remove('bell-acked');
                }, 300);
                
                // Show "On my way!" feedback
                const statusText = document.getElementById('statusText');
                statusText.textContent = "✓ Sent!";
                statusText.style.color = "#2e8b2e";
                statusText.style.fontWeight = "bold";
                
                // Reset the received ring flag
                hasReceivedRing = false;
                return;
            }
            
            // Clear any existing ack banner when ringing (new ring = new session)
            clearAckBanner();
            lastRingTimestamp = Date.now();
            lastAckTimestamp = 0;
            
            // Reset status text
            const statusText = document.getElementById('statusText');
            statusText.textContent = "Ready";
            statusText.style.color = "#5d4037";
            statusText.style.fontWeight = "normal";
            
            // Write ring event to database
            db.ref('rooms/' + currentRoom + '/ring').set({
                active: true,
                timestamp: Date.now()
            });
            
            // Start listening for acknowledgments (in case we get any)
            startAckListener();
            
            // Also update last ring time locally
            const now = new Date();
            lastRingEl.textContent = `Last rung: ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
            
            // Show sender's brief feedback
            triggerBell(false);
            
            // Visual button feedback
            bellBtn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                bellBtn.style.transform = 'scale(1)';
            }, 200);
        });
        
        // Timer functionality
        let timerInterval = null;
        let timerSeconds = 0;
        const timerDisplay = document.getElementById('timerDisplay');
        const timerDisplayContainer = document.getElementById('timerDisplayContainer');
        
        // Picker values
        let pickerMinutes = 0;
        let pickerSeconds = 0;
        
        function adjustMinutes(delta) {
            pickerMinutes = Math.max(0, Math.min(60, pickerMinutes + delta));
            document.getElementById('minutesValue').textContent = pickerMinutes;
        }
        
        function adjustSeconds(delta) {
            // Handle overflow/underflow
            if (pickerSeconds + delta < 0) {
                if (pickerMinutes > 0) {
                    pickerMinutes--;
                    pickerSeconds = 55;
                } else {
                    pickerSeconds = 0;
                }
            } else if (pickerSeconds + delta >= 60) {
                if (pickerMinutes < 60) {
                    pickerMinutes++;
                    pickerSeconds = (pickerSeconds + delta) - 60;
                } else {
                    pickerSeconds = 59;
                }
            } else {
                pickerSeconds += delta;
            }
            document.getElementById('secondsValue').textContent = pickerSeconds;
        }
        
        function startTimer() {
            const minutes = pickerMinutes;
            const seconds = pickerSeconds;
            
            if (minutes === 0 && seconds === 0) return;
            
            timerDisplayContainer.classList.remove('timer-done');
            timerDisplayContainer.classList.add('show');
            
            timerSeconds = (minutes * 60) + seconds;
            updateTimerDisplay();
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerDisplayContainer.classList.add('running');
            
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    playTimerAlarm();
                    timerDisplay.textContent = "00:00";
                    timerDisplayContainer.classList.remove('running');
                    timerDisplayContainer.classList.add('timer-done');
                }
            }, 1000);
        }
        
        function setPreset(minutes) {
            pickerMinutes = minutes;
            pickerSeconds = 0;
            document.getElementById('minutesValue').textContent = pickerMinutes;
            document.getElementById('secondsValue').textContent = pickerSeconds;
            startTimer();
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerSeconds = 0;
            timerDisplay.textContent = '';
            if (timerDisplayContainer) {
                timerDisplayContainer.classList.remove('running', 'timer-done', 'show');
            }
            // Reset pickers
            pickerMinutes = 0;
            pickerSeconds = 0;
            document.getElementById('minutesValue').textContent = '0';
            document.getElementById('secondsValue').textContent = '0';
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function playTimerAlarm() {
            // Play the bell sound 3 times for timer
            let count = 0;
            const maxPlays = 3;
            function playNext() {
                if (count < maxPlays) {
                    bellAudio.currentTime = 0;
                    bellAudio.play().catch(e => console.log('Timer alarm failed:', e));
                    count++;
                    setTimeout(playNext, 800);
                }
            }
            playNext();
        }
        
        // Wake Lock functionality
        let wakeLock = null;
        let wakeLockEnabled = false;
        const wakeLockBtn = document.getElementById('wakeLockBtn');
        
        async function toggleWakeLock() {
            if (!wakeLockEnabled) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLockEnabled = true;
                    wakeLockBtn.textContent = 'Awake: On';
                    wakeLock.addEventListener('release', () => {
                        wakeLockEnabled = false;
                        wakeLockBtn.textContent = 'Awake: Off';
                    });
                } catch (err) {
                    console.log('Wake Lock error:', err);
                    wakeLockBtn.textContent = 'No support';
                }
            } else {
                if (wakeLock) {
                    wakeLock.release();
                    wakeLock = null;
                }
                wakeLockEnabled = false;
                wakeLockBtn.textContent = 'Awake: Off';
            }
        }
        
        // Re-acquire wake lock if page becomes visible again
        document.addEventListener('visibilitychange', async () => {
            if (wakeLockEnabled && document.visibilityState === 'visible') {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log('Wake Lock re-acquire error:', err);
                }
            }
        });
        
        function resetApp() {
            // Release wake lock if active
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
            wakeLockEnabled = false;
            
            // Show title again
            document.getElementById('title').style.display = 'block';
            
            localStorage.removeItem('dinnerBellRoom');
            localStorage.removeItem('dinnerBellCurrentRoom');
            localStorage.removeItem('dinnerBellPairedRoom');
            if (currentRoom) {
                db.ref('rooms/' + currentRoom + '/ring').off();
            }
            location.reload();
        }
        
        // On load: check if we have a saved room
        window.addEventListener('load', () => {
            const savedRoom = localStorage.getItem('dinnerBellCurrentRoom');
            if (savedRoom) {
                enterRoom(savedRoom);
            }
        });
    </script>
</body>
</html>
