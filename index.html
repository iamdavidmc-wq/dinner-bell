<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dinner Bell 🔔</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            touch-action: manipulation;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .room-info {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .room-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .room-code {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            font-family: monospace;
        }
        
        .bell-button {
            font-size: 8rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            margin: 30px 0;
        }
        
        .bell-button:active {
            transform: scale(0.9);
        }
        
        .bell-label {
            font-size: 1.5rem;
            margin-top: 10px;
            opacity: 0.9;
        }
        
        .message {
            background: rgba(255,255,255,0.3);
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            backdrop-filter: blur(10px);
        }
        
        .pairing-section {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
        }
        
        .pairing-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 5px;
            max-width: 250px;
        }
        
        .pairing-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .pairing-button:hover {
            background: #45a049;
        }
        
        .hidden {
            display: none !important;
        }
        
        .ring-time {
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dinner Bell 🔔</h1>
        
        <div id="pairingSection" class="pairing-section">
            <div class="room-label">Your Room Code</div>
            <div id="myRoomCode" class="room-code">---</div>
            <p style="margin: 15px 0; opacity: 0.8;">Share this with the other phone</p>
            
            <div style="margin: 20px 0; opacity: 0.5;">— or —</div>
            
            <input type="text" id="pairingCode" class="pairing-input" placeholder="ENTER CODE" maxlength="6">
            <button onclick="pairWithRoom()" class="pairing-button">Connect</button>
            <p id="pairingStatus" style="margin-top: 15px; min-height: 20px;"></p>
        </div>
        
        <div id="mainApp" class="hidden">
            <div class="room-info">
                <div class="room-label">Room</div>
                <div id="currentRoom" class="room-code">---</div>
                <div class="ring-time" id="lastRing">Last rung: Never</div>
            </div>
            
            <button id="bellBtn" class="bell-button">🔔</button>
            <div class="bell-label">Tap to ring!</div>
            
            <div id="message" class="message">
                Waiting for bell...
            </div>
        </div>
    </div>

    <audio id="bellAudio" preload="auto" style="display:none;">
        <source src="ding.mp3" type="audio/mpeg">
    </audio>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAWEmSzgw7j28WvIBk1Ffg7pZijSxDAJM4",
            authDomain: "dinner-bell-3776f.firebaseapp.com",
            databaseURL: "https://dinner-bell-3776f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dinner-bell-3776f",
            storageBucket: "dinner-bell-3776f.firebasestorage.app",
            messagingSenderId: "832766937759",
            appId: "1:832766937759:web:5aaa110e5dc927753330aa",
            measurementId: "G-DQ7J8VEC5X"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio element for bell sound
        const bellAudio = document.getElementById('bellAudio');
        
        // Room management
        let currentRoom = localStorage.getItem('dinnerBellRoom');
        const pairingInput = document.getElementById('pairingCode');
        const pairingSection = document.getElementById('pairingSection');
        const mainApp = document.getElementById('mainApp');
        const bellBtn = document.getElementById('bellBtn');
        const message = document.getElementById('message');
        const myRoomCodeEl = document.getElementById('myRoomCode');
        const currentRoomEl = document.getElementById('currentRoom');
        const pairingStatus = document.getElementById('pairingStatus');
        const lastRingEl = document.getElementById('lastRing');
        
        // Generate 6-digit room code if none exists
        if (!currentRoom) {
            currentRoom = String(Math.floor(100000 + Math.random() * 900000));
            localStorage.setItem('dinnerBellRoom', currentRoom);
        }
        
        myRoomCodeEl.textContent = currentRoom;
        
        // If already paired (has a different room in localStorage), join it directly
        const pairedRoom = localStorage.getItem('dinnerBellPairedRoom');
        if (pairedRoom) {
            enterRoom(pairedRoom);
        }
        
        // Pair with another room
        function pairWithRoom() {
            const code = pairingInput.value.trim().toUpperCase();
            if (code.length !== 6 || !/^\d+$/.test(code)) {
                pairingStatus.textContent = "Please enter a valid 6-digit code";
                pairingStatus.style.color = "#ffcccc";
                return;
            }
            
            // Check if room exists by reading a test location
            const testRef = db.ref('rooms/' + code + '/exists');
            testRef.set(true);
            
            testRef.once('value').then(() => {
                // Room exists or was just created, join it
                localStorage.setItem('dinnerBellPairedRoom', code);
                enterRoom(code);
            }).catch(() => {
                pairingStatus.textContent = "Could not connect. Make sure the code is correct.";
                pairingStatus.style.color = "#ffcccc";
            });
        }
        
        function enterRoom(roomCode) {
            currentRoom = roomCode;
            currentRoomEl.textContent = roomCode;
            pairingSection.classList.add('hidden');
            mainApp.classList.remove('hidden');
            
            // Listen for ring events
            const ringRef = db.ref('rooms/' + roomCode + '/ring');
            ringRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.active === true) {
                    // Bell is ringing!
                    triggerBell();
                    
                    // Update last ring time
                    const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    lastRingEl.textContent = `Last rung: ${time}`;
                }
            });
            
            // Mark as online
            db.ref('rooms/' + roomCode + '/users/' + getDeviceId()).set({
                online: true,
                lastSeen: Date.now()
            });
        }
        
        function getDeviceId() {
            let id = localStorage.getItem('dinnerBellDeviceId');
            if (!id) {
                id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('dinnerBellDeviceId', id);
            }
            return id;
        }
        
        function triggerBell() {
            // Play sound three times
            let playCount = 0;
            const maxPlays = 3;
            
            function playNext() {
                if (playCount < maxPlays) {
                    bellAudio.currentTime = 0;
                    bellAudio.play().catch(e => console.log('Audio play failed:', e));
                    playCount++;
                    // Wait for audio to finish (or 1 second) before next play
                    setTimeout(playNext, 1200);
                }
            }
            
            playNext();
            
            // Show message
            message.innerHTML = "🔔 <strong>Dinner's Ready!</strong>";
            message.style.background = "rgba(76, 175, 80, 0.4)";
            
            setTimeout(() => {
                message.innerHTML = "Connected & ready";
                message.style.background = "rgba(255,255,255,0.3)";
            }, 5000);
        }
        
        // Bell button press
        bellBtn.addEventListener('click', () => {
            // Write ring event to database
            db.ref('rooms/' + currentRoom + '/ring').set({
                active: true,
                timestamp: Date.now()
            });
            
            // Also update last ring time locally
            const now = new Date();
            lastRingEl.textContent = `Last rung: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            
            // Visual feedback
            bellBtn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                bellBtn.style.transform = 'scale(1)';
            }, 200);
        });
        
        // Request notification permission (optional, for better mobile experience)
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
