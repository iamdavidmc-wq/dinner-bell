<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dinner Bell 🍽️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Dinner Bell">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Patrick Hand', cursive;
            background: linear-gradient(135deg, #e67e22 0%, #f5deb3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #3d2b1f;
            padding: 20px;
            touch-action: manipulation;
            position: relative;
        }
        
        /* Subtle paper texture overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-family: 'Patrick Hand', cursive;
            color: #5d4037;
        }
        
        .room-info {
            background: #fff8dc;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d4c4a8;
        }
        
        .room-label {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 5px;
            font-family: 'Patrick Hand', cursive;
        }
        
        .room-code {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            font-family: monospace;
            color: #3d2b1f;
        }
        
        .bell-button {
            font-size: 14rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            margin: 10px 0;
            line-height: 1;
        }
        
        .bell-button:active {
            transform: scale(0.9);
        }
        
        .bell-label {
            font-size: 1.8rem;
            margin-top: 5px;
            opacity: 0.9;
            font-family: 'Patrick Hand', cursive;
            color: #5d4037;
        }
        
        .message {
            background: #fff8dc;
            padding: 25px 30px;
            border-radius: 12px;
            margin-top: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d4c4a8;
            position: relative;
            /* Recipe card ruled lines */
            background-image: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 1.8rem,
                #d4c4a8 1.8rem,
                #d4c4a8 1.9rem
            );
            background-size: 100% 3.8rem;
        }
        
        .message-content {
            background: rgba(255, 248, 220, 0.95);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .setup-option {
            background: #fff8dc;
            padding: 30px;
            border-radius: 15px;
            margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d4c4a8;
        }
        
        .big-button {
            background: linear-gradient(to bottom, #8b4513, #654321);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
            min-width: 200px;
            font-family: 'Patrick Hand', cursive;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid #a0522d;
        }
        
        .big-button:hover {
            background: linear-gradient(to bottom, #9e5a2a, #755624);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }
        
        .pairing-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid #d4c4a8;
            border-radius: 12px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 5px;
            max-width: 250px;
            background: #fffef5;
            font-family: monospace;
            color: #3d2b1f;
        }
        
        .pairing-input:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.2);
        }
        
        .pairing-button {
            background: linear-gradient(to bottom, #228b22, #1a6b1a);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Patrick Hand', cursive;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid #2e8b2e;
        }
        
        .pairing-button:hover {
            background: linear-gradient(to bottom, #269926, #1e7b1e);
            transform: translateY(-2px);
        }
        
        .hidden {
            display: none !important;
        }
        
        .ring-time {
            font-size: 0.9rem;
            margin-top: 8px;
            opacity: 0.7;
            font-family: 'Patrick Hand', cursive;
            color: #5d4037;
        }
        
        .reset-link {
            background:none;
            border:none;
            color: #8b4513;
            font-size:1rem;
            text-decoration:underline;
            cursor:pointer;
            margin-top:20px;
            font-family: 'Patrick Hand', cursive;
        }
        
        .reset-link:hover {
            color: #654321;
        }
        
        #wakeLockBtn {
            background: rgba(139, 69, 19, 0.15);
            border: 2px solid #d4c4a8;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1rem;
        }
        
        #wakeLockBtn:hover {
            background: rgba(139, 69, 19, 0.25);
        }
        
        #pairingStatus {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.1rem;
        }
        
        /* Timer Section Styles */
        .timer-card {
            background: linear-gradient(145deg, #fffef8 0%, #fff8dc 100%);
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 8px 32px rgba(139, 69, 19, 0.15), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            border: 2px solid #d4c4a8;
            margin-bottom: 20px;
        }
        
        .timer-section-title {
            font-size: 1.3rem;
            color: #8b4513;
            margin-bottom: 12px;
            font-family: 'Patrick Hand', cursive;
        }
        
        .timer-dial-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .dial-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .dial-label {
            font-size: 0.85rem;
            color: #8b4513;
            font-weight: bold;
            font-family: 'Patrick Hand', cursive;
            margin-bottom: 8px;
        }
        
        .dial {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(145deg, #fffef8, #fff8dc);
            border: 3px solid #d4c4a8;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.8);
            position: relative;
            touch-action: none;
            cursor: pointer;
        }
        
        .dial-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #8b4513;
            font-family: 'Courier New', monospace;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        
        .dial-knob {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e67e22, #d35400);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        
        .dial-ticks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .dial-tick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 8px;
            background: #d4c4a8;
            transform-origin: center 50%;
        }
        
        .preset-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .preset-btn {
            background: linear-gradient(145deg, #f5deb3, #e6d2a0);
            color: #8b4513;
            border: 2px solid #d4c4a8;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Patrick Hand', cursive;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        
        .preset-btn:hover {
            background: linear-gradient(145deg, #ffe4b5, #f0d9a8);
            border-color: #8b4513;
            transform: translateY(-1px);
        }
        
        .control-buttons-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .timer-control-btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            font-size: 1.1rem;
            font-family: 'Patrick Hand', cursive;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .start-btn {
            background: linear-gradient(145deg, #e67e22, #d35400) !important;
            color: white;
            border: 2px solid #bf6a2e;
        }
        
        .start-btn:hover {
            background: linear-gradient(145deg, #f39c12, #e67e22) !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.5);
        }
        
        .stop-btn {
            background: linear-gradient(145deg, #d4a574, #b8860b);
            color: white;
            border: 2px solid #8b4513;
        }
        
        .stop-btn:hover {
            background: linear-gradient(145deg, #e6b87d, #d4a574);
            transform: translateY(-2px);
        }
        
        .timer-display-container {
            background: linear-gradient(145deg, #3d2b1f, #2a1f15);
            border-radius: 50%;
            width: 140px;
            height: 140px;
            display: none;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1);
            border: 4px solid #d4c4a8;
            position: relative;
        }
        
        .timer-display-container.show {
            display: flex;
        }
        
        .timer-display-container.running {
            box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1), 0 0 40px rgba(230, 126, 34, 0.6);
            border-color: #e67e22;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1), 0 0 30px rgba(230, 126, 34, 0.4); }
            50% { box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 4px 15px rgba(255,255,255,0.1), 0 0 50px rgba(230, 126, 34, 0.7); }
        }
        
        .timer-display {
            font-size: 2.2rem;
            font-weight: bold;
            color: #f5deb3;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(245, 222, 179, 0.5);
        }
        
        .timer-done .timer-display-container {
            animation: bellShake 0.5s ease-in-out;
            border-color: #ffd700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.8);
        }
        
        @keyframes bellShake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-10deg); }
            40% { transform: rotate(10deg); }
            60% { transform: rotate(-10deg); }
            80% { transform: rotate(10deg); }
        }
        
        .timer-done .timer-display {
            color: #ffd700;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            animation: pulse 0.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .timer-note {
            font-size: 0.8rem;
            color: #8b4513;
            opacity: 0.7;
            margin-bottom: 12px;
            font-style: italic;
        }
        
        @media (min-width: 500px) {
            .timer-card {
                padding: 30px 25px;
            }
            .timer-section-title {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }
            .dial {
                width: 140px;
                height: 140px;
            }
            .dial-inner {
                font-size: 2.5rem;
            }
            .dial-knob {
                width: 20px;
                height: 20px;
                top: 10px;
            }
            .preset-row {
                gap: 10px;
                margin-bottom: 20px;
            }
            .preset-btn {
                padding: 10px 16px;
                font-size: 1rem;
            }
            .control-buttons-row {
                gap: 20px;
                margin-bottom: 25px;
            }
            .timer-control-btn {
                padding: 15px 45px;
                font-size: 1.3rem;
                min-width: 120px;
            }
            .timer-display-container {
                width: 180px;
                height: 180px;
            }
            .timer-display {
                font-size: 3rem;
            }
            .timer-note {
                font-size: 0.9rem;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Show title only in pairing mode -->
        <h1 id="title" style="font-size: 2rem; margin-bottom: 15px;">🍴 Dinner Bell 🔔</h1>
        
        <div id="pairingSection">
            <div class="room-label">Your Room Code</div>
            <div id="myRoomCode" class="room-code">---</div>
            <p style="margin: 15px 0; opacity: 0.8;">Share this code</p>
            
            <div style="margin: 15px 0; opacity: 0.5;">— or —</div>
            
            <input type="text" id="pairingCode" class="pairing-input" placeholder="ENTER CODE" maxlength="6">
            <button onclick="pairWithRoom()" class="pairing-button">Connect</button>
            <p id="pairingStatus" style="margin-top: 15px; min-height: 20px;"></p>
        </div>
        
        <div id="mainApp" class="hidden">
            <!-- BELL SECTION - Top of page, higher position -->
            <div style="padding-bottom: 15px; border-bottom: 2px dashed #d4c4a8; margin-bottom: 25px;">
                <h2 style="font-size: 1.3rem; color: #8b4513; margin-bottom: 8px; font-family: 'Patrick Hand', cursive;">🔔 DINNER BELL</h2>
                
                <!-- Large centered bell -->
                <button id="bellBtn" class="bell-button">🔔</button>
                
                <!-- Status text below bell -->
                <div id="statusText" style="font-size: 1.2rem; color: #5d4037; margin-top: 5px;">Ready</div>
            </div>
            
            <!-- TIMER SECTION - Enhanced stylish layout -->
            <div class="timer-card">
                <div class="timer-section-title">⏰ DINNER TIMER</div>
                
                <div class="timer-note">Twist dials to set time</div>
                
                <!-- Circular dials for time selection -->
                <div class="timer-dial-container">
                    <div class="dial-wrapper">
                        <span class="dial-label">Minutes</span>
                        <div class="dial" id="minutesDial" data-type="minutes">
                            <div class="dial-ticks"></div>
                            <div class="dial-knob"></div>
                            <div class="dial-inner" id="minutesValue">0</div>
                        </div>
                    </div>
                    <div class="dial-wrapper">
                        <span class="dial-label">Seconds</span>
                        <div class="dial" id="secondsDial" data-type="seconds">
                            <div class="dial-ticks"></div>
                            <div class="dial-knob"></div>
                            <div class="dial-inner" id="secondsValue">0</div>
                        </div>
                    </div>
                </div>
                
                <!-- Preset buttons -->
                <div class="preset-row">
                    <button onclick="setPreset(1)" class="preset-btn">🥚 1m</button>
                    <button onclick="setPreset(3)" class="preset-btn">🥣 3m</button>
                    <button onclick="setPreset(5)" class="preset-btn">🍝 5m</button>
                    <button onclick="setPreset(10)" class="preset-btn">🍖 10m</button>
                </div>
                
                <!-- Start/Stop controls -->
                <div class="control-buttons-row">
                    <button onclick="startTimer()" class="timer-control-btn start-btn">Start</button>
                    <button onclick="stopTimer()" class="timer-control-btn stop-btn">Stop</button>
                </div>
                
                <!-- Circular timer display -->
                <div id="timerDisplayContainer" class="timer-display-container">
                    <div id="timerDisplay" class="timer-display"></div>
                </div>
            </div>
            
            <!-- Bottom row: Room code | Awake | Reset -->
            <div style="margin-top: 25px; display: flex; gap: 20px; justify-content: center; align-items: center; flex-wrap: wrap;">
                <span id="roomInfoSmall" style="font-size: 0.8rem; color: #8b4513; opacity: 0.5;">Room: <span id="currentRoomSmall">---</span></span>
                <button id="wakeLockBtn" onclick="toggleWakeLock()" style="background: rgba(139, 69, 19, 0.1); border: 1px solid #d4c4a8; padding: 8px 15px; border-radius: 20px; color: #8b4513; font-family: 'Patrick Hand', cursive; font-size: 0.85rem;">Awake</button>
                <button onclick="resetApp()" style="background: none; border: none; color: #8b4513; font-size: 0.85rem; text-decoration: underline; font-family: 'Patrick Hand', cursive;">Reset</button>
            </div>
        </div>
    </div>

    <audio id="bellAudio" preload="auto" style="display:none;">
        <source src="ding.mp3" type="audio/mpeg">
    </audio>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAWEmSzgw7j28WvIBk1Ffg7pZijSxDAJM4",
            authDomain: "dinner-bell-3776f.firebaseapp.com",
            databaseURL: "https://dinner-bell-3776f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dinner-bell-3776f",
            storageBucket: "dinner-bell-3776f.firebasestorage.app",
            messagingSenderId: "832766937759",
            appId: "1:832766937759:web:5aaa110e5dc927753330aa",
            measurementId: "G-DQ7J8VEC5X"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio element for bell sound
        const bellAudio = document.getElementById('bellAudio');
        
        // Room management
        let currentRoom = localStorage.getItem('dinnerBellRoom');
        const pairingInput = document.getElementById('pairingCode');
        const pairingSection = document.getElementById('pairingSection');
        const mainApp = document.getElementById('mainApp');
        const bellBtn = document.getElementById('bellBtn');
        const message = document.getElementById('message');
        const messageContent = document.querySelector('.message-content');
        const myRoomCodeEl = document.getElementById('myRoomCode');
        const currentRoomEl = document.getElementById('currentRoom');
        const pairingStatus = document.getElementById('pairingStatus');
        const lastRingEl = document.getElementById('lastRing');
        
        // Generate 6-digit room code if none exists
        if (!currentRoom) {
            currentRoom = String(Math.floor(100000 + Math.random() * 900000));
            localStorage.setItem('dinnerBellRoom', currentRoom);
        }
        
        myRoomCodeEl.textContent = currentRoom;
        
        // If already paired (has a different room in localStorage), join it directly
        const pairedRoom = localStorage.getItem('dinnerBellPairedRoom');
        if (pairedRoom) {
            enterRoom(pairedRoom);
        }
        
        // Pair with another room
        function pairWithRoom() {
            const code = pairingInput.value.trim().toUpperCase();
            if (code.length !== 6 || !/^\d+$/.test(code)) {
                pairingStatus.textContent = "Please enter a valid 6-digit code";
                pairingStatus.style.color = "#8b0000";
                return;
            }
            
            // Check if room exists by reading a test location
            const testRef = db.ref('rooms/' + code + '/exists');
            testRef.set(true);
            
            testRef.once('value').then(() => {
                // Room exists or was just created, join it
                localStorage.setItem('dinnerBellPairedRoom', code);
                enterRoom(code);
            }).catch(() => {
                pairingStatus.textContent = "Could not connect. Make sure the code is correct.";
                pairingStatus.style.color = "#8b0000";
            });
        }
        
        function enterRoom(roomCode) {
            currentRoom = roomCode;
            document.getElementById('currentRoomSmall').textContent = roomCode;
            document.getElementById('title').style.display = 'none';
            pairingSection.classList.add('hidden');
            mainApp.classList.remove('hidden');
            
            // Track when we joined to ignore old ring events
            const joinTime = Date.now();
            
            // Listen for ring events (receiver)
            const ringRef = db.ref('rooms/' + roomCode + '/ring');
            ringRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.active === true) {
                    // Only trigger if ring happened after we joined (within 1 second grace period)
                    const ringTime = data.timestamp;
                    if (ringTime >= joinTime - 1000) {
                        // Bell is ringing! This is the receiver
                        triggerBell(true);
                        
                        // Update last ring time
                        const time = new Date(ringTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        lastRingEl.textContent = `Last rung: ${time}`;
                    }
                }
            });
            
            // Mark as online
            db.ref('rooms/' + roomCode + '/users/' + getDeviceId()).set({
                online: true,
                lastSeen: Date.now()
            });
        }
        
        function getDeviceId() {
            let id = localStorage.getItem('dinnerBellDeviceId');
            if (!id) {
                id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('dinnerBellDeviceId', id);
            }
            return id;
        }
        
        function triggerBell(isReceiver) {
            // Play sound three times, waiting for each to finish
            let playCount = 0;
            const maxPlays = 3;
            
            function playNext() {
                if (playCount < maxPlays) {
                    bellAudio.currentTime = 0;
                    bellAudio.play().catch(e => console.log('Audio play failed:', e));
                    playCount++;
                }
            }
            
            // Listen for when audio ends, then play next ring
            bellAudio.onended = function() {
                if (playCount < maxPlays) {
                    // Wait a brief pause between rings
                    setTimeout(playNext, 0);
                }
            };
            
            // Start first ring
            playNext();
            
            // Use small status text instead of large message box
            const statusText = document.getElementById('statusText');
            
            if (isReceiver) {
                // Receiver sees the excited message
                statusText.innerHTML = "<strong>Dinner is ready!</strong> COME AND GET EAT! 🔥";
                statusText.style.color = "#e67e22";
                statusText.style.fontWeight = "bold";
                
                // Keep message for 8 seconds then back to ready
                setTimeout(() => {
                    statusText.textContent = "Ready";
                    statusText.style.color = "#5d4037";
                    statusText.style.fontWeight = "normal";
                }, 8000);
            } else {
                // Sender sees brief confirmation
                statusText.textContent = "Ringing...";
                statusText.style.color = "#8b4513";
                
                // Back to ready after 2 seconds
                setTimeout(() => {
                    statusText.textContent = "Ready";
                    statusText.style.color = "#5d4037";
                }, 2000);
                setTimeout(() => {
                    messageContent.innerHTML = "Connected & ready";
                    message.style.background = "rgba(255, 248, 220, 0.7)";
                }, 2000);
            }
        }
        
        // Bell button press (sender)
        bellBtn.addEventListener('click', () => {
            if (!currentRoom) return;
            
            // Write ring event to database
            db.ref('rooms/' + currentRoom + '/ring').set({
                active: true,
                timestamp: Date.now()
            });
            
            // Also update last ring time locally
            const now = new Date();
            lastRingEl.textContent = `Last rung: ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
            
            // Show sender's brief feedback
            triggerBell(false);
            
            // Visual button feedback
            bellBtn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                bellBtn.style.transform = 'scale(1)';
            }, 200);
        });
        
        // Timer functionality
        let timerInterval = null;
        let timerSeconds = 0;
        const timerDisplay = document.getElementById('timerDisplay');
        const timerDisplayContainer = document.getElementById('timerDisplayContainer');
        
        // Dial state
        let dialMinutes = 0;
        let dialSeconds = 0;
        let dialStartY = 0;
        let dialStartValue = 0;
        let isDraggingDial = false;
        
        // Initialize dials
        function initDials() {
            const minutesDial = document.getElementById('minutesDial');
            const secondsDial = document.getElementById('secondsDial');
            
            [minutesDial, secondsDial].forEach(dial => {
                dial.addEventListener('touchstart', handleDialStart, { passive: false });
                dial.addEventListener('touchmove', handleDialMove, { passive: false });
                dial.addEventListener('touchend', handleDialEnd);
                dial.addEventListener('mousedown', handleDialStart);
            });
            
            document.addEventListener('mousemove', handleDialMove);
            document.addEventListener('mouseup', handleDialEnd);
        }
        
        function handleDialStart(e) {
            e.preventDefault();
            isDraggingDial = true;
            const dial = e.currentTarget;
            const type = dial.dataset.type;
            
            if (e.type === 'touchstart') {
                dialStartY = e.touches[0].clientY;
            } else {
                dialStartY = e.clientY;
            }
            
            dialStartValue = type === 'minutes' ? dialMinutes : dialSeconds;
            dial.classList.add('dragging');
        }
        
        function handleDialMove(e) {
            if (!isDraggingDial) return;
            e.preventDefault();
            
            const activeDial = document.querySelector('.dial.dragging');
            if (!activeDial) return;
            
            const type = activeDial.dataset.type;
            let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            
            // Calculate change - dragging up increases, down decreases
            const deltaY = dialStartY - currentY;
            const sensitivity = type === 'minutes' ? 0.5 : 1; // More sensitive for seconds
            
            let newValue;
            if (type === 'minutes') {
                newValue = Math.max(0, Math.min(60, dialStartValue + Math.floor(deltaY * sensitivity)));
            } else {
                newValue = Math.max(0, Math.min(59, dialStartValue + Math.floor(deltaY * sensitivity)));
            }
            
            if (type === 'minutes') {
                dialMinutes = newValue;
                document.getElementById('minutesValue').textContent = dialMinutes;
                updateDialRotation(activeDial, dialMinutes, 60);
            } else {
                dialSeconds = newValue;
                document.getElementById('secondsValue').textContent = dialSeconds;
                updateDialRotation(activeDial, dialSeconds, 60);
            }
        }
        
        function handleDialEnd() {
            isDraggingDial = false;
            document.querySelectorAll('.dial').forEach(dial => dial.classList.remove('dragging'));
        }
        
        function updateDialRotation(dial, value, max) {
            // Rotate the knob based on value (0 to max = 0 to 270 degrees)
            const rotation = (value / max) * 270;
            const knob = dial.querySelector('.dial-knob');
            knob.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
        }
        
        // Quick preset from dial values
        function startTimer() {
            const minutes = dialMinutes;
            const seconds = dialSeconds;
            
            if (minutes === 0 && seconds === 0) return;
            
            timerDisplayContainer.classList.remove('timer-done');
            timerDisplayContainer.classList.add('show');
            
            timerSeconds = (minutes * 60) + seconds;
            updateTimerDisplay();
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerDisplayContainer.classList.add('running');
            
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    playTimerAlarm();
                    timerDisplay.textContent = "00:00";
                    timerDisplayContainer.classList.remove('running');
                    timerDisplayContainer.classList.add('timer-done');
                }
            }, 1000);
        }
        
        function setPreset(minutes) {
            dialMinutes = minutes;
            dialSeconds = 0;
            document.getElementById('minutesValue').textContent = dialMinutes;
            document.getElementById('secondsValue').textContent = dialSeconds;
            updateDialRotation(document.getElementById('minutesDial'), dialMinutes, 60);
            updateDialRotation(document.getElementById('secondsDial'), dialSeconds, 60);
            startTimer();
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerSeconds = 0;
            timerDisplay.textContent = '';
            if (timerDisplayContainer) {
                timerDisplayContainer.classList.remove('running', 'timer-done', 'show');
            }
            // Reset dials
            dialMinutes = 0;
            dialSeconds = 0;
            document.getElementById('minutesValue').textContent = '0';
            document.getElementById('secondsValue').textContent = '0';
            document.querySelectorAll('.dial').forEach(dial => {
                updateDialRotation(dial, 0, 60);
            });
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function playTimerAlarm() {
            // Play the bell sound 3 times for timer
            let count = 0;
            const maxPlays = 3;
            function playNext() {
                if (count < maxPlays) {
                    bellAudio.currentTime = 0;
                    bellAudio.play().catch(e => console.log('Timer alarm failed:', e));
                    count++;
                    setTimeout(playNext, 800);
                }
            }
            playNext();
        }
        
        // Wake Lock functionality
        let wakeLock = null;
        let wakeLockEnabled = false;
        const wakeLockBtn = document.getElementById('wakeLockBtn');
        
        async function toggleWakeLock() {
            if (!wakeLockEnabled) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLockEnabled = true;
                    wakeLockBtn.textContent = 'Awake: On';
                    wakeLock.addEventListener('release', () => {
                        wakeLockEnabled = false;
                        wakeLockBtn.textContent = 'Awake: Off';
                    });
                } catch (err) {
                    console.log('Wake Lock error:', err);
                    wakeLockBtn.textContent = 'No support';
                }
            } else {
                if (wakeLock) {
                    wakeLock.release();
                    wakeLock = null;
                }
                wakeLockEnabled = false;
                wakeLockBtn.textContent = 'Awake: Off';
            }
        }
        
        // Re-acquire wake lock if page becomes visible again
        document.addEventListener('visibilitychange', async () => {
            if (wakeLockEnabled && document.visibilityState === 'visible') {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log('Wake Lock re-acquire error:', err);
                }
            }
        });
        
        function resetApp() {
            // Release wake lock if active
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
            wakeLockEnabled = false;
            
            // Show title again
            document.getElementById('title').style.display = 'block';
            
            localStorage.removeItem('dinnerBellRoom');
            localStorage.removeItem('dinnerBellCurrentRoom');
            localStorage.removeItem('dinnerBellPairedRoom');
            if (currentRoom) {
                db.ref('rooms/' + currentRoom + '/ring').off();
            }
            location.reload();
        }
        
        // On load: check if we have a saved room
        window.addEventListener('load', () => {
            const savedRoom = localStorage.getItem('dinnerBellCurrentRoom');
            if (savedRoom) {
                enterRoom(savedRoom);
            } else {
                // Stay on setup screen
            }
            // Initialize the dials
            initDials();
        });
    </script>
</body>
</html>
